<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold VIP Membership Card</title>
    <style>
        :root {
            /* Gold Color Palette */
            --gold-light: #f9e3a3;
            --gold-medium: #d4af37;
            --gold-dark: #a67c00;
            --bronze-text: #5c4300;
            --card-shadow: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a; /* Dark background to make gold pop */
            margin: 0;
        }

        /* The Gold Card */
        .id-card {
            width: 550px;
            height: 330px;
            background: linear-gradient(135deg, #fdf1ad 0%, #d4af37 40%, #b8860b 100%);
            border: 3px solid #8a6d3b;
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 15px 35px var(--card-shadow), inset 0 0 15px rgba(255,255,255,0.5);
            position: relative;
            color: var(--bronze-text);
            box-sizing: border-box;
        }

        /* Decorative Border Inside */
        .id-card::after {
            content: '';
            position: absolute;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            pointer-events: none;
        }

        .header {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--gold-dark);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: #444; 
            margin-right: 15px;
            border: 2px solid var(--gold-dark);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .title-area h2 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
        }

        .membership-label {
            font-weight: 800;
            font-size: 19px;
            display: block;
            margin-top: 3px;
        }

        .card-body {
            display: flex;
            gap: 25px;
        }

        /* Photo Upload Area */
        .profile-container {
            width: 150px;
            height: 170px;
            border: 3px solid #8a6d3b;
            background: #fdf1ad;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        #profile-display {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-hint {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            padding: 10px;
        }

        /* Input Fields */
        .details {
            flex-grow: 1;
        }

        .field {
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: 900;
        }

        input[type="text"] {
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 17px;
            font-weight: 600;
            color: #222;
            width: 100%;
            border-bottom: 1px solid transparent;
        }

        input[type="text"]:hover, input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.4);
            outline: none;
            border-bottom: 1px solid var(--gold-dark);
        }

        /* VIP Seal */
        .vip-seal {
            position: absolute;
            right: 25px;
            top: 130px;
            width: 85px;
            height: 85px;
            background: radial-gradient(circle, #f9e3a3, #d4af37, #a67c00);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border: 3px double #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transform: rotate(-5deg);
        }

        .signature-section {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<div class="id-card">
    <div class="header">
        <div class="logo-circle"></div>
        <div class="title-area">
            <h2>GEORGE STRAIT FANS CLUB</h2>
            <span class="membership-label">MEMBERSHIP ID CARD</span>
        </div>
    </div>

    <div class="card-body">
        <div class="profile-container" onclick="document.getElementById('file-input').click()">
            <span class="photo-hint">CLICK TO<br>UPLOAD PHOTO</span>
            <img id="profile-display" src="" alt="">
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="details">
            <div class="field">NAME: <input type="text" value="Shirley Strait"></div>
            <div class="field">SEX: <input type="text" value="F" style="width: 40px;"></div>
            <div class="field">STATE: <input type="text" value="Texas"></div>
            <div class="field">STATUS: <input type="text" value="VIP MEMBER"></div>
            
            <div style="margin-top: 15px;">
                <div class="field">ACTIVATION: <input type="text" value="13/06/2024"></div>
                <div class="field">DE-ACTIVATION: <input type="text" value="13/06/2025"></div>
            </div>
        </div>
    </div>

    <div class="vip-seal">
        <span style="font-size: 9px;">MEMBERSHIP</span>
        <span style="font-size: 22px;">VIP</span>
    </div>

    <div class="signature-section">
        <div style="border-top: 1px solid #5c4300; padding-top: 5px;">Member Signature</div>
        <div style="border-top: 1px solid #5c4300; padding-top: 5px; text-align: right;">CEO Signature</div>
    </div>
</div>

<script>
    // Handle the profile image upload
    const fileInput = document.getElementById('file-input');
    const profileDisplay = document.getElementById('profile-display');
    const photoHint = document.querySelector('.photo-hint');

    fileInput.onchange = evt => {
        const [file] = fileInput.files;
        if (file) {
            profileDisplay.src = URL.createObjectURL(file);
            photoHint.style.display = 'none';
        }
    }
</script>

</body>
</html>
